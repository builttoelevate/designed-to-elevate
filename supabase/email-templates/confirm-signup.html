<!--
  Designed to Elevate — Supabase "Confirm signup" template
  Safety net for any flow that asks the user to confirm their email.
  Paste into: Authentication → Email Templates → Confirm signup → Source
  Subject:    Confirm your Client Hub email
  Placeholders: {{ .ConfirmationURL }}, {{ .Email }}
-->
<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<meta name="supported-color-schemes" content="dark light">
<title>Confirm your Client Hub email</title>
<!--[if mso]>
<noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
<![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#0F0F0F;">
<div style="display:none;max-height:0;overflow:hidden;mso-hide:all;visibility:hidden;color:transparent;font-size:1px;line-height:1px;opacity:0;">Confirm your email to access your Client Hub.</div>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#0F0F0F" style="background-color:#0F0F0F;margin:0;padding:0;">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="560" bgcolor="#1A1A1A" style="background-color:#1A1A1A;border-radius:14px;max-width:560px;width:100%;">
        <tr>
          <td style="padding:32px 30px 0;">
            <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#F5F5F5;">Designed to <span style="color:#FF6A00;">Elevate</span></span>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 30px 14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:24px;line-height:1.25;color:#F5F5F5;letter-spacing:-0.01em;">
            Confirm your email
          </td>
        </tr>
        <tr>
          <td style="padding:0 30px 26px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#A1A1AA;">
            <p style="margin:0;">Please confirm your email address to access your Client Hub.</p>
          </td>
        </tr>
        <tr>
          <td align="left" style="padding:0 30px 32px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td bgcolor="#FF6A00" style="background-color:#FF6A00;border-radius:8px;">
                  <!--[if mso]>
                  <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{ .ConfirmationURL }}" style="height:46px;v-text-anchor:middle;width:200px;" arcsize="17%" stroke="f" fillcolor="#FF6A00">
                    <w:anchorlock/>
                    <center style="color:#000000;font-family:Arial,sans-serif;font-size:15px;font-weight:bold;">Confirm email</center>
                  </v:roundrect>
                  <![endif]-->
                  <!--[if !mso]><!-- -->
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 30px;color:#000000;background-color:#FF6A00;border-radius:8px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:15px;line-height:1;mso-padding-alt:0;">Confirm email</a>
                  <!--<![endif]-->
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>
          <td style="border-top:1px solid #2A2A2A;padding:22px 30px 30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1.6;color:#71717A;">
            Designed to Elevate · Zanesville, Ohio · <a href="https://designedtoelevate.co" style="color:#71717A;text-decoration:underline;">designedtoelevate.co</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
